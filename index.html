<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nigeria Asset Intelligence &mdash; SWF Edition v16</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',system-ui,sans-serif;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#0a0a0c;overflow:hidden;}
#map-wrap{position:relative;width:100%;height:100vh;}
#ngm{width:100%;height:100%;}
@keyframes mPulse{0%{opacity:.55;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.8)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideOut{from{transform:translateX(0)}to{transform:translateX(100%)}}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{background:rgba(18,18,22,.97)!important;border:.5px solid rgba(255,255,255,.08)!important;border-radius:14px!important;box-shadow:0 20px 50px rgba(0,0,0,.5)!important;color:rgba(255,255,255,.85)!important;}
.leaflet-popup-tip-container{display:none!important;}
.leaflet-popup-content{margin:16px 18px 14px!important;width:310px!important;}
.leaflet-popup-close-button{color:rgba(255,255,255,.3)!important;font-size:18px!important;top:10px!important;right:12px!important;}
.leaflet-popup-close-button:hover{color:rgba(255,255,255,.7)!important;}
.leaflet-control-zoom{border:none!important;box-shadow:none!important;margin-right:14px!important;margin-top:72px!important;}
.leaflet-control-zoom a{background:rgba(18,18,22,.92)!important;color:rgba(255,255,255,.7)!important;border:.5px solid rgba(255,255,255,.08)!important;border-radius:10px!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:19px!important;display:block!important;margin-bottom:5px!important;}
.leaflet-control-zoom a:hover{background:rgba(255,255,255,.12)!important;color:#fff!important;}
.leaflet-control-attribution{background:rgba(0,0,0,.45)!important;color:rgba(255,255,255,.2)!important;font-size:9px!important;border-radius:6px 0 0 0!important;padding:3px 8px!important;}

/* Panel base (replaces .glass) */
.panel{background:rgba(18,18,22,.94);border:.5px solid rgba(255,255,255,.08);border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.glass{background:rgba(18,18,22,.94);border:.5px solid rgba(255,255,255,.08);border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.25);}

/* Popup content styles */
.pc{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;opacity:.65;}
.pt-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.pt-name{font-size:16.5px;font-weight:600;color:#fff;line-height:1.3;flex:1;}
.pt-arr{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.4);cursor:pointer;user-select:none;}
.expandable{cursor:pointer;}
.expandable:hover .pt-name{color:#fff;}
.expandable:hover .pt-arr{background:rgba(255,255,255,.13);color:rgba(255,255,255,.7);}
.pt-arr.open{background:rgba(10,132,255,.16);border-color:rgba(10,132,255,.4);color:rgba(100,180,255,.9);}
.pd{font-size:13.5px;color:rgba(255,255,255,.5);line-height:1.65;margin-bottom:10px;}
.pi{background:rgba(52,211,153,.08);border-left:2px solid rgba(52,211,153,.4);padding:7px 10px;border-radius:0 8px 8px 0;font-size:13px;color:rgba(100,220,160,.9);line-height:1.55;margin-bottom:4px;}
.pw{background:rgba(0,212,255,.07);border-left:2px solid rgba(0,212,255,.3);padding:7px 10px;border-radius:0 8px 8px 0;font-size:13px;color:rgba(100,220,255,.9);line-height:1.55;margin-bottom:4px;}
.pp{background:rgba(255,195,0,.07);border-left:2px solid rgba(255,195,0,.4);padding:7px 10px;border-radius:0 8px 8px 0;font-size:13px;color:rgba(255,210,70,.9);line-height:1.55;margin-bottom:4px;}
.pcoord{font-size:10px;font-family:'SF Mono',monospace;color:rgba(255,255,255,.18);margin-top:8px;}
.pxsec{display:none;border-top:.5px solid rgba(255,255,255,.07);padding-top:12px;margin-top:10px;max-height:340px;overflow-y:auto;}
.pxsec::-webkit-scrollbar{width:3px;}
.pxsec::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.psgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px;}
.ps{background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.07);border-radius:10px;padding:8px 10px;}
.ps-v{font-size:16.5px;font-weight:600;line-height:1.15;margin-bottom:3px;}
.ps-l{font-size:9px;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.06em;}
.px-label{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.25);margin:10px 0 5px;}
.px-body{font-size:13px;color:rgba(255,255,255,.52);line-height:1.7;}
.px-thesis{background:rgba(10,132,255,.07);border-left:2px solid rgba(10,132,255,.3);padding:7px 10px;border-radius:0 8px 8px 0;font-size:13px;color:rgba(120,190,255,.9);line-height:1.6;margin:5px 0;}
.px-risks{list-style:none;}
.px-risks li{font-size:12.5px;color:rgba(255,110,110,.75);padding:3px 0 3px 14px;position:relative;line-height:1.5;}
.px-risks li::before{content:'\25B8';position:absolute;left:0;opacity:.5;}

/* Header — slim top bar */
#header{position:absolute;top:12px;left:12px;right:12px;z-index:1003;}
#header .hbar{padding:8px 14px;display:flex;align-items:center;gap:12px;}
#header .hbar .logo-area{display:flex;align-items:center;gap:10px;flex-shrink:0;}
#header .hbar .logo-area img{height:18px;opacity:.9;}
#header .hbar .htitle{font-size:14px;font-weight:600;color:rgba(255,255,255,.88);letter-spacing:-.01em;white-space:nowrap;}
.nh-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(46,125,82,.12);border:.5px solid rgba(46,125,82,.35);border-radius:14px;padding:2px 8px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(46,125,82,.9);}
.nh-dot{width:5px;height:5px;border-radius:50%;background:#2E7D52;animation:nhP 2.5s ease-in-out infinite;}
@keyframes nhP{0%,100%{opacity:1}50%{opacity:.4}}
.hsearch{flex:1;min-width:0;background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 12px;color:white;font-size:13px;outline:none;}
.hsearch::placeholder{color:rgba(255,255,255,.25);}
.hsearch:focus{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);}
.hbtn{width:34px;height:34px;border-radius:10px;border:.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.hbtn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);}
.hbtn.active{background:rgba(10,132,255,.15);border-color:rgba(10,132,255,.3);color:rgba(120,180,255,.9);}

/* Asset browser */
#ab{position:absolute;top:62px;left:12px;right:12px;z-index:1002;display:none;max-height:calc(100% - 90px);overflow:hidden;flex-direction:column;animation:dropIn .18s ease both;}
#ab.open{display:flex;}
#ab-list{overflow-y:auto;flex:1;}
#ab-list::-webkit-scrollbar{width:3px;}
#ab-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px;}
.ab-search{width:100%;background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 14px;color:white;font-size:14px;outline:none;}
.ab-search::placeholder{color:rgba(255,255,255,.25);}
.ab-tab{padding:5px 12px;border-radius:14px;border:.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .14s;flex-shrink:0;}
.ab-tab.on{background:rgba(10,132,255,.15);border-color:rgba(10,132,255,.35);color:rgba(255,255,255,.9);}
.ab-cat{padding:8px 16px 4px;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);display:flex;align-items:center;gap:8px;}
.ab-cat-line{flex:1;height:.5px;background:rgba(255,255,255,.06);}
.ab-row{display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;transition:background .12s;border-bottom:.5px solid rgba(255,255,255,.03);}
.ab-row:hover{background:rgba(255,255,255,.05);}
.ab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ab-info{flex:1;min-width:0;}
.ab-name{font-size:14px;font-weight:500;color:rgba(255,255,255,.82);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ab-sub{font-size:12px;color:rgba(255,255,255,.28);margin-top:1px;}
.ab-type{font-size:10px;padding:2px 7px;border-radius:8px;border:.5px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);flex-shrink:0;}
.ab-arrow{font-size:14px;color:rgba(255,255,255,.2);}
.ab-empty{padding:28px;text-align:center;color:rgba(255,255,255,.25);font-size:13px;}

/* Sidebar */
#sidebar{position:absolute;top:12px;right:12px;bottom:12px;width:280px;z-index:1004;overflow:hidden;display:none;animation:slideIn .2s ease both;}
#sidebar.open{display:flex;flex-direction:column;}
#sidebar.closing{display:flex;flex-direction:column;animation:slideOut .18s ease both;}
#sidebar .sb-head{padding:12px 14px 10px;border-bottom:.5px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#sidebar .sb-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.02em;}
#sidebar .sb-close{width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#sidebar .sb-close:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}
#sidebar .sb-body{overflow-y:auto;flex:1;padding:12px 14px;}
#sidebar .sb-body::-webkit-scrollbar{width:3px;}
#sidebar .sb-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.sb-section{margin-bottom:16px;}
.sb-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px;}
.sb-sep{height:.5px;background:rgba(255,255,255,.05);margin:12px 0;}
#sc{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px;}
.sc-item{background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.05);border-radius:10px;padding:8px 10px;}
.sc-label{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:2px;}
.sc-value{font-size:17px;font-weight:500;}

/* Layer & overlay pills */
.cpill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;border:.5px solid rgba(255,255,255,.08);font-size:11px;font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;background:rgba(255,255,255,.04);}
.cpill.off{opacity:.25;}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
#layers-panel{display:none;}
#filter-panels{display:none;}

/* Filter items (used inside sidebar) */
.filter-panel{display:none;}
.filter-panel.visible{display:block;margin-bottom:12px;}
.fpill-item{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:14px;border:.5px solid rgba(255,255,255,.08);font-size:11px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;background:transparent;margin-bottom:4px;white-space:nowrap;}
.fpill-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);}
.fpill-item.dam-on{border-color:rgba(0,212,255,.4);color:rgba(0,212,255,.85);background:rgba(0,212,255,.08);}
.fpill-item.og-on{border-color:rgba(255,149,0,.4);color:rgba(255,149,0,.85);background:rgba(255,149,0,.08);}
.fpill-item .fc{font-size:9px;background:rgba(255,255,255,.08);border-radius:8px;padding:1px 6px;margin-left:auto;}
.panel-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.panel-sep{height:.5px;background:rgba(255,255,255,.05);margin:8px 0;}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px;color:rgba(255,255,255,.45);}
.min-on{border-color:rgba(212,175,55,.4)!important;color:rgba(212,175,55,.85)!important;background:rgba(212,175,55,.08)!important;}
.src-note{font-size:9px;color:rgba(255,255,255,.15);font-style:italic;margin-top:4px;padding-top:4px;border-top:.5px solid rgba(255,255,255,.04);}

/* Stat buttons (in sidebar) */
.stat-btn{cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .14s;text-align:center;}
.stat-btn:hover{background:rgba(255,255,255,.06);}
.stat-btn.active{background:rgba(10,132,255,.12);}

/* Misc */
.fdrop{position:absolute;top:calc(100% + 10px);right:0;width:268px;max-height:460px;overflow-y:auto;display:none;z-index:1200;}
.fdrop.open{display:block;}
.fghdr{padding:8px 14px 5px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.32);display:flex;justify-content:space-between;align-items:center;}
.fitem{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;}
.fchk{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(255,255,255,.2);background:transparent;appearance:none;cursor:pointer;position:relative;flex-shrink:0;}
.fchk:checked{background:#0A84FF;border-color:#0A84FF;}
.fchk:checked::after{content:'';position:absolute;left:4.5px;top:1.5px;width:5px;height:9px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);}
.fname{font-size:13px;color:rgba(255,255,255,.72);flex:1;}
.fcnt-min{font-size:11px;color:rgba(255,255,255,.25);}
.fsep{height:.5px;background:rgba(255,255,255,.06);margin:3px 0;}
.fpill{display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:22px;border:.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.8);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.fpill.active{background:rgba(10,132,255,.12);border-color:rgba(10,132,255,.3);}
.pf-bar{background:linear-gradient(90deg,rgba(46,125,82,.12),transparent);border-left:2px solid #2E7D52;padding:5px 10px;margin-bottom:8px;border-radius:0 6px 6px 0;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(46,125,82,.85);}
.pf-thesis{background:rgba(46,125,82,.07);border-left:2px solid rgba(46,125,82,.4);padding:7px 10px;border-radius:0 8px 8px 0;font-size:13px;color:rgba(120,220,160,.9);line-height:1.6;margin:5px 0;}
/* v16 — Explore button + layer accordion */
.hbtn-label{width:auto;padding:0 12px;gap:6px;font-size:12px;font-weight:500;letter-spacing:.02em;}
.hbtn-label.active{background:rgba(212,175,55,.14);border-color:rgba(212,175,55,.45);color:rgba(235,200,100,.95);}
.lyr-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;border:.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);margin-bottom:6px;cursor:pointer;transition:background .14s,border-color .14s;}
.lyr-row:hover{background:rgba(255,255,255,.06);}
.lyr-row.on{border-color:rgba(212,175,55,.32);background:rgba(212,175,55,.05);}
.lyr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(0,0,0,.3);}
.lyr-name{flex:1;font-size:13px;font-weight:500;color:rgba(255,255,255,.82);}
.lyr-row.off .lyr-name{color:rgba(255,255,255,.38);}
.lyr-count{font-size:10px;color:rgba(255,255,255,.32);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.lyr-caret{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.35);transition:transform .18s;}
.lyr-caret.open{transform:rotate(90deg);color:rgba(212,175,55,.8);}
.lyr-filters{display:none;padding:4px 2px 10px 22px;animation:none;}
.lyr-filters.open{display:block;animation:dropIn .18s ease both;}
.lyr-fchip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:12px;border:.5px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.55);cursor:pointer;margin:3px 3px 0 0;background:transparent;transition:background .12s,border-color .12s,color .12s;user-select:none;}
.lyr-fchip:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85);}
.lyr-fchip.on{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.4);color:rgba(235,200,100,.95);}
.lyr-fchip.on-water{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.4);color:rgba(120,220,255,.95);}
.lyr-fchip.on-og{background:rgba(255,149,0,.1);border-color:rgba(255,149,0,.4);color:rgba(255,190,90,.95);}
.lyr-fchip .fc{font-size:9px;opacity:.55;margin-left:2px;font-variant-numeric:tabular-nums;}
#ab.explore-mode{left:50%;right:auto;transform:translateX(-50%);max-width:1040px;width:calc(100% - 40px);top:70px;max-height:calc(100% - 90px);}
#ab.explore-mode #ab-tabs{display:none;}
#ab.explore-mode .ab-cat{padding:14px 20px 6px;font-size:10.5px;letter-spacing:.12em;color:rgba(212,175,55,.85);}
#ab.explore-mode .ab-row{padding:11px 20px;border-bottom:.5px solid rgba(255,255,255,.04);}
#ab.explore-mode #ab-list{padding-bottom:10px;}
.ab-cat-head{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;border-top:.5px solid rgba(255,255,255,.04);}
.ab-cat-head:hover{background:rgba(255,255,255,.03);}
.ab-cat-head .ab-cat-caret{font-size:10px;color:rgba(255,255,255,.4);transition:transform .18s;width:12px;text-align:center;}
.ab-cat-head .ab-cat-caret.open{transform:rotate(90deg);color:#D4AF37;}
.ab-cat-title{flex:1;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.78);}
.ab-cat-n{font-size:10px;color:rgba(255,255,255,.35);font-variant-numeric:tabular-nums;}
#layers-panel,#filter-panels{display:none!important;}
</style>
</head>
<body>
<div id="map-wrap">
<div id="ngm"></div>
<div id="header">
<div class="panel hbar">
  <div class="logo-area">
    <img src="https://cdn.prod.website-files.com/6978550a664b785d36028c0b/699992656dd2d7f4c1325884_Norhaven_UAE_Primary_Logo_Green.svg" alt="Norhaven"/>
    <div class="htitle">Nigeria Deal Intelligence</div>
    <div class="nh-badge"><div class="nh-dot"></div>Live</div>
  </div>
  <input class="hsearch" type="text" placeholder="Search 264 assets&#8230;" id="header-search" oninput="headerSearchHandler(this.value)"/>
  <button class="hbtn hbtn-label" id="explore-toggle" onclick="toggleExplore()" title="Browse assets by category">Explore</button>
  <button class="hbtn" id="sidebar-toggle" onclick="toggleSidebar()" title="Layers &amp; Overlays">&#9776;</button>
</div>
</div>
<div id="ab" class="glass">
  <div style="padding:14px 16px 10px;border-bottom:.5px solid rgba(255,255,255,.07);flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <input id="ab-search" class="ab-search" type="text" placeholder="Search assets&#8230;" oninput="renderABList()"/>
      <button onclick="closeBrowser()" style="background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.45);font-size:16px;width:34px;height:34px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">&#10005;</button>
    </div>
    <div id="ab-tabs" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;"></div>
  </div>
  <div id="ab-list"></div>
</div>
<div id="sidebar" class="panel">
  <div class="sb-head">
    <div class="sb-title">Layers &amp; Overlays</div>
    <button class="sb-close" onclick="toggleSidebar()">&#10005;</button>
  </div>
  <div class="sb-body">
    <div class="sb-section">
      <div class="sb-label">Overview</div>
      <div id="sc"></div>
    </div>

(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Iron Ore</div><div class=\"pt-row expandable\" id=\"ptr-200\"><div class=\"pt-name\">Ajaokuta Steel Complex</div><div class=\"pt-arr\" id=\"pxa-200\">&#8595;</div></div><div class=\"pd\">$3.3B+ sunk. 98% complete. Never operated.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Greatest stranded asset on continent. 55% discount to greenfield.</div><div class=\"pxsec\" id=\"pxs-200\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">$3.3B+</div><div class=\"ps-l\">Sunk Capital</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">1.3 MTPA</div><div class=\"ps-l\">Nameplate Cap.</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">98%</div><div class=\"ps-l\">Completion</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Never</div><div class=\"ps-l\">Commercial Op.</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">The most strategically significant stranded industrial asset on the African continent. Construction commenced 1979 by Soviet engineers, $3.3B+ invested, built to 98% completion, yet has never produced commercial steel in 45 years.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">At $1.0-1.5B completion cost vs. $3.3B+ replacement value, this is a 55% asset discount to greenfield. Dedicated iron ore supply (Itakpe SGR), dedicated power, river confluence, Osara+Omi dam water 30km, Okaba coal 40km \u2014 every physical input exists. The only missing ingredient is capital and political resolve.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Itakpe-Warri SGR (iron ore feed) \u00b7 132kV dedicated transmission \u00b7 Niger River confluence \u00b7 Osara Dam 30km \u00b7 Omi Dam 30km \u00b7 Okaba Coal 40km \u00b7 A2 highway</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Decades of political deadlock and institutional capture</li><li>Grid power reliability for 1,400\u00b0C blast furnace</li><li>Labour relations from 40 years of unfulfilled promises</li></ul>\n</div><div class=\"pcoord\">7.5500&deg; N &middot; 6.6600&deg; E</div>");var m=L.marker([7.55,6.66],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:15px;height:15px;\"><div style=\"position:absolute;top:50%;left:50%;width:37.5px;height:37.5px;margin-left:-18.75px;margin-top:-18.75px;border-radius:50%;background:#D4AF37;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#D4AF37;border:1.5px solid rgba(255,255,255,.55);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:5.7px;height:5.7px;background:rgba(255,255,255,.85);transform:translate(-50%,-50%) rotate(45deg);\"></div></div></div>",iconSize:[15,15],iconAnchor:[7,7],popupAnchor:[0,-15]})}).bindPopup(p);mineralGroup.addLayer(m);mineralMkrs.push({marker:m,tags:["Iron Ore", "Steel"]});allPopups[200]=p;allAssets.push({name:"Ajaokuta Steel Complex",type:"Iron Ore",sub:"Kogi",catKey:'minerals',catLabel:'Minerals',color:'#D4AF37',lat:7.55,lng:6.66,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Iron Ore</div><div class=\"pt-row expandable\" id=\"ptr-201\"><div class=\"pt-name\">Agbaja Iron Ore</div><div class=\"pt-arr\" id=\"pxa-201\">&#8595;</div></div><div class=\"pd\">1B+ tonne. Adjacent to Itakpe.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Combined 1.2B+ tonne block \u2014 60yr mine life.</div><div class=\"pxsec\" id=\"pxs-201\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">1B+ T</div><div class=\"ps-l\">Estimated Resource</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Kogi</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Adjacent</div><div class=\"ps-l\">To Itakpe</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">SGR Route</div><div class=\"ps-l\">Expansion</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">1B+ tonne iron ore deposit in Kogi State adjacent to Itakpe. Combined Itakpe + Agbaja = 1.2B+ tonne block \u2014 one of the largest undeveloped iron ore concentrations in Sub-Saharan Africa.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Agbaja is the scale extension of the Itakpe thesis. The existing Itakpe-Warri SGR can be expanded to serve both deposits. Combined 1.2B tonne resource extends steel complex raw material security to 60+ years at 5M MTPA.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Itakpe-Warri SGR extension potential \u00b7 Ajaokuta Steel Complex 30km \u00b7 Niger River confluence</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Resource definition still at exploration stage for Agbaja</li><li>Development requires Ajaokuta resolution first</li><li>Kogi State land tenure and community relations</li></ul>\ (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Tantalite</div><div class=\"pt-row expandable\" id=\"ptr-204\"><div class=\"pt-name\">Nasarawa Critical Hub</div><div class=\"pt-arr\" id=\"pxa-204\">&#8595;</div></div><div class=\"pd\">Most mineral-diverse state. Tantalite, lithium, sapphire.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> EV-era critical minerals basket. Doma Dam water 30km.</div><div class=\"pxsec\" id=\"pxs-204\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Tantalite</div><div class=\"ps-l\">Critical Metal</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Lithium</div><div class=\"ps-l\">EV Battery Metal</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Sapphire</div><div class=\"ps-l\">Gemstone Export</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Most Diverse</div><div class=\"ps-l\">Mineral State</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nasarawa State is Nigeria's most mineral-diverse state. Documented occurrences include tantalite, lithium, sapphire, tourmaline, aquamarine, beryl, cassiterite, and baryte. NGSA has confirmed commercial-grade tantalite at multiple locations.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">EV-era critical minerals basket from a single state: tantalite (capacitors), lithium (batteries), and columbite (EV motors). EU and US critical minerals diversification laws create structural demand. Doma Dam (375M m3) provides industrial water 30km away \u2014 removing the primary development constraint.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Lafia-Abuja highway \u00b7 Lower Benue RBDA \u00b7 Doma Dam water 30km \u00b7 Benue River access to Calabar Port</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Resource definition \u2014 exploration-stage for most deposits (no JORC yet)</li><li>Processing infrastructure absent \u2014 full greenfield capex required</li><li>Community land rights in Nasarawa State</li></ul>\n</div><div class=\"pcoord\">8.5400&deg; N &middot; 8.5200&deg; E</div>");var m=L.marker([8.54,8.52],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:11px;height:11px;\"><div style=\"position:absolute;top:50%;left:50%;width:27.5px;height:27.5px;margin-left:-13.75px;margin-top:-13.75px;border-radius:50%;background:#D4AF37;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#D4AF37;border:1.5px solid rgba(255,255,255,.55);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:4.18px;height:4.18px;background:rgba(255,255,255,.85);transform:translate(-50%,-50%) rotate(45deg);\"></div></div></div>",iconSize:[11,11],iconAnchor:[5,5],popupAnchor:[0,-13]})}).bindPopup(p);mineralGroup.addLayer(m);mineralMkrs.push({marker:m,tags:["Tantalite", "Lithium", "Gemstones"]});allPopups[204]=p;allAssets.push({name:"Nasarawa Critical Hub",type:"Tantalite",sub:"Nasarawa",catKey:'minerals',catLabel:'Minerals',color:'#D4AF37',lat:8.54,lng:8.52,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Lead</div><div class=\"pt-row expandable\" id=\"ptr-205\"><div class=\"pt-name\">Abakaliki Lead-Zinc</div><div class=\"pt-arr\" id=\"pxa-205\">&#8595;</div></div><div class=\"pd\">Africa-grade lead-zinc ore body.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Battery metals. Calabar port 200km.</div><div class=\"pxsec\" id=\"pxs-205\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Africa-Grade</div><div class=\"ps-l\">Ore Quality</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Ebonyi</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Lead + Zinc</div><div class=\"ps-l\">Battery Metals</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">200km</div><div class=\"ps-l\">To Calabar Port</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Africa-grade lead-zinc ore body in Ebonyi State along the Benue Trough sedimentary sequence. Lead-zinc sulfides amenable to conventional flotation processing. Historically mined at small scale during colonial era.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Lead and zinc are both battery metals (lead-acid storage, zinc-air batteries) and industrial metals. At $2,200/tonne zinc + $2,000/tonne lead blended basket, a 100,000 tonne/year concentrates operation generates $420M/year in revenue.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Cross River access to Calabar Port 200km \u00b7 Enugu city 80km \u00b7 SE Nigeria road network</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Reserve definition required \u2014 current estimates geological not JORC-standard</li><li>Concentrator capex $80-120M for meaningful scale operatio (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Lead</div><div class=\"pt-row expandable\" id=\"ptr-206\"><div class=\"pt-name\">Ishiagu Lead-Zinc</div><div class=\"pt-arr\" id=\"pxa-206\">&#8595;</div></div><div class=\"pd\">Secondary lead-zinc.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Combined with Abakaliki = single processing plant.</div><div class=\"pxsec\" id=\"pxs-206\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Secondary</div><div class=\"ps-l\">Occurrence</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Ebonyi</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Benue Trough</div><div class=\"ps-l\">Geology</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Cross River</div><div class=\"ps-l\">Export Route</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Secondary lead-zinc occurrence in Ebonyi State along the Benue Trough. Cross River access provides waterway export route to Calabar Port.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Scale extension of Abakaliki thesis. Combined Abakaliki + Ishiagu = larger resource base for a single processing plant. Cross River waterway barge transport to Calabar Port is the lowest-cost export route.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Cross River waterway to Calabar Port \u00b7 Enugu city 100km \u00b7 SE Nigeria road network</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Smaller and less defined than Abakaliki</li><li>Artisanal mining present \u2014 consolidation required</li><li>Benue Trough flooding risk in river valley areas</li></ul>\n</div><div class=\"pcoord\">5.8800&deg; N &middot; 7.6000&deg; E</div>");var m=L.marker([5 (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Baryte</div><div class=\"pt-row expandable\" id=\"ptr-207\"><div class=\"pt-name\">Azara Baryte</div><div class=\"pt-arr\" id=\"pxa-207\">&#8595;</div></div><div class=\"pd\">7.5M+ tonnes. World-class drilling mineral.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Niger Delta = captive buyer. $50M plant serves entire industry.</div><div class=\"pxsec\" id=\"pxs-207\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">7.5M+ T</div><div class=\"ps-l\">Estimated Resource</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">World Class</div><div class=\"ps-l\">Drilling Grade</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Nasarawa</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">$750M+</div><div class=\"ps-l\">Addressable Market</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">7.5M+ tonnes of world-class, drilling-grade baryte in Nasarawa State. Baryte is essential for drilling fluid formulation at every oil and gas well \u2014 the Niger Delta oil industry is a permanent captive buyer.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Nigeria imports virtually all its drilling baryte despite having domestic resources. At $100-150/tonne delivered vs. $200-250/tonne imported, domestic Azara baryte saves the oil industry $50-100M/year. A $50M mining and processing operation serves the captive Niger Delta market.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Lafia-Abuja highway \u00b7 Benue River 50km (barge route south) \u00b7 Nasarawa State road network</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Baryte processing to API drilling grade spec requires investment ($20-30M)</li><li>Oil industry procurement dominated by long-term import supply agreements</li><li>Benue River navigation limitations in dry season</li></ul>\n</div><div class=\"pcoord\">8.3800&deg; N &middot; 8.9800&deg; E</div>");var m=L.marker([8.38,8.98],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:10px;height:10px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#D4AF37;border:1.5px solid rgba(255,255,255,.55);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:3.8px;height:3.8px;background:rgba(255,255,255,.85);transform:translate(-50%,-50%) rotate(45deg);\"></div></div></div>",iconSize:[10,10],iconAnchor:[5,5],popupAnchor:[0,-13]})}).bindPopup(p);mineralGroup.addLayer(m);mineralMkrs.push({marker:m,tags:["Baryte"]});allPopups[207]=p;allAssets.push({name:"Azara Baryte",type:"Baryte",sub:"Nasarawa",catKey:'minerals',catLabel:'Minerals',color:'#D4AF37',lat:8.38,lng:8.98,marker:m,priority:false,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Baryte</div><div class=\"pt-row expandable\" id=\"ptr-208\"><div class=\"pt-name\">Aliade Baryte</div><div class=\"pt-arr\" id=\"pxa-208\">&#8595;</div></div><div class=\"pd\">Significant baryte. Benue Trough.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Benue River transport south to Niger Delta.</div><div class=\"pxsec\" id=\"pxs-208\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Benue</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Significant</div><div class=\"ps-l\">Resource</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Benue Trough</div><div class=\"ps-l\">Geology</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">River Export</div><div class=\"ps-l\">Route</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Significant baryte deposit in Benue State along the Benue Trough. Second major baryte resource after Azara. Benue River provides waterway transport southward to the Niger River and Warri Port.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Combined Azara + Aliade creates a baryte cluster with enough scale to displace majority of Nigeria's imported drilling baryte. River access to the Niger Delta oil industry captive market.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Benue River access (waterway export south) \u00b7 Niger River to Warri Port \u00b7 Makurdi city 40km</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Reserve definition required for Aliade</li><li>River navigation seasonal limitations</li><li>Combined development with Azara more economic than standalone</li></ul>\n</div><div class=\"pcoord\">7.2300&deg; N &middot; 9 (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Baryte</div><div class=\"pt-row expandable\" id=\"ptr-209\"><div class=\"pt-name\">Tiken Baryte</div><div class=\"pt-arr\" id=\"pxa-209\">&#8595;</div></div><div class=\"pd\">Baryte in sedimentary sequence.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Calabar port direct export. Shortest route to market.</div><div class=\"pxsec\" id=\"pxs-209\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Cross River</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Calabar Port</div><div class=\"ps-l\">Direct Export</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Sedimentary</div><div class=\"ps-l\">Sequence</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Shortest Route</div><div class=\"ps-l\">To Export</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Baryte deposit in Cross River State sedimentary sequence. Calabar Port provides the shortest export route of the three baryte zones to international oil companies.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Cross River State = Calabar Port direct export. At $150-200/tonne FOB Calabar, Tiken baryte can supply West African offshore markets (Equatorial Guinea, Cameroon, Gabon) without traversing Nigeria's road network.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Calabar Port direct \u00b7 Cross River State road network \u00b7 Lagos-Calabar Highway corridor</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Reserve definition at exploration stage</li><li>Cross River State community land rights</li><li>Port access for bulk baryte shipment</li></ul>\n</div><div class=\"pcoord\">5.9000&deg; N &middot; 8.8000& (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Bitumen</div><div class=\"pt-row expandable\" id=\"ptr-210\"><div class=\"pt-name\">Agbabu Bitumen Field</div><div class=\"pt-arr\" id=\"pxa-210\">&#8595;</div></div><div class=\"pd\">42.47 billion tonne belt. World #4.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> $1.5B/yr import substitution. Lagos-Calabar Highway = captive demand.</div><div class=\"pxsec\" id=\"pxs-210\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">42.47B T</div><div class=\"ps-l\">Belt Reserve</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">World #4</div><div class=\"ps-l\">Tar Sand Belt</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">400km</div><div class=\"ps-l\">Coastal Belt</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">$1T+</div><div class=\"ps-l\">In-Ground Value</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's Ondo-Ogun bitumen belt is the 4th largest tar sand accumulation on Earth. 42.47 billion tonnes across a 400km coastal belt at 0-40m depth \u2014 the shallowest and most accessible major tar sand deposit globally. Nigeria imports 100% of its asphalt needs ($1.5B/year).</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Nigeria imports $1.5B/year in asphalt. Domestic processing at $25-40/tonne delivers product at half the import price. The Lagos-Calabar Highway passes directly through this belt \u2014 creating Nigeria's largest captive demand anchor. The highway alone requires 5M+ tonnes of asphalt.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Lagos-Calabar Highway corridor (direct route) \u00b7 Apapa Port 150km \u00b7 Warri Port 200km \u00b7 Shallow depth = low strip ratio</div>\n<div class=\"px-label (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Coal</div><div class=\"pt-row expandable\" id=\"ptr-213\"><div class=\"pt-name\">Iva Valley Coal</div><div class=\"pt-arr\" id=\"pxa-213\">&#8595;</div></div><div class=\"pd\">3B+ tonne. Low-sulphur coking grade.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Ajaokuta feedstock: saves $187.5M/yr vs. imported coal.</div><div class=\"pxsec\" id=\"pxs-213\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">3B+ T</div><div class=\"ps-l\">Estimated Resource</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Low Sulphur</div><div class=\"ps-l\">Coking Grade</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Enugu</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">$175/T</div><div class=\"ps-l\">Vs. Import Cost</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">3B+ tonne, low-sulphur coking grade coal in Enugu State. Nigeria's largest coal deposit. Ajaokuta Steel requires 2.5M MTPA of coking coal currently 100% imported at $175/tonne.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Domestic Iva Valley coal at $80-100/tonne production cost vs. $175/tonne imported = $200M+/year cost saving for Ajaokuta at full operation. Coal development and Ajaokuta commissioning are mutually reinforcing investments.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Enugu-Kogi road corridor 150km \u00b7 Ajaokuta Steel Complex 150km \u00b7 Calabar Port 200km</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Ajaokuta commissioning is the primary demand driver \u2014 circular dependency</li><li>Underground coal mining \u2014 safety and operational standards require upgrade</li><li>Commun (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Diamonds</div><div class=\"pt-row expandable\" id=\"ptr-220\"><div class=\"pt-name\">Katsina Diamond Occurrence</div><div class=\"pt-arr\" id=\"pxa-220\">&#8595;</div></div><div class=\"pd\">Kimberlite structures. Pre-commercial.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Pre-competitive exploration. De Beers historical interest in NW Nigeria.</div><div class=\"pxsec\" id=\"pxs-220\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Kimberlite</div><div class=\"ps-l\">Structure</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Pre-Commercial</div><div class=\"ps-l\">Stage</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Katsina</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Exploration</div><div class=\"ps-l\">Opportunity</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Kimberlite structures with diamond indicator minerals confirmed in Katsina State. Pre-commercial \u2014 requires systematic kimberlite mapping and bulk sampling. De Beers has historically indicated interest in NW Nigeria kimberlite exploration.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Pre-competitive exploration entry: kimberlite structures in Katsina are poorly explored relative to comparable West African geology. At $5-20/carat rough diamond discovery value, a 1M carat deposit at 0.5 carats/tonne = $500M+ in-ground value from 2M tonne kimberlite pipe.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Katsina city 30km \u00b7 Kano International Airport 150km \u00b7 Zobe Dam water 90km</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Kimberlite mapping required before resou (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#D4AF37;\">Minerals &middot; Gold</div><div class=\"pt-row expandable\" id=\"ptr-244\"><div class=\"pt-name\">Segilola Gold Mine</div><div class=\"pt-arr\" id=\"pxa-244\">&#8595;</div></div><div class=\"pd\">Nigeria's first industrial gold mine. Thor Explorations. 80K oz/yr.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Benchmark for Nigerian gold mining. Secondary market or JV at proven cashflow.</div><div class=\"pxsec\" id=\"pxs-244\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">80K oz/yr</div><div class=\"ps-l\">Production</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">$120M</div><div class=\"ps-l\">Revenue Est.</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Thor Expl.</div><div class=\"ps-l\">Operator</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">2022</div><div class=\"ps-l\">First Pour</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria’s first large-scale industrial gold mine, operated by Thor Explorations (TSX-V: THX). Located on the Ilesha Schist Belt in Osun State. Open-pit CIL operation with 80,000 oz/yr production. JORC resource of 1.1Moz at 3.2 g/t.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Segilola proves Nigerian hard-rock gold is commercially viable at scale. At $2,400/oz and 80K oz/yr, the mine generates $120M+/yr gross revenue at AISC of ~$900/oz. SWF play: acquire Thor’s Nigeria assets as a platform for consolidating the Ilesha and Zamfara gold belts.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Osun State paved road network · Lagos 250km · Ilesha town 15km · Grid power available</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Thor Explorations share price volat "ps-v\" style=\"color:#D4AF37;\">Sn-Nb-Ta</div><div class=\"ps-l\">Commodities</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">Jos ring cx</div><div class=\"ps-l\">Geology</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#D4AF37;\">NGSA 2023</div><div class=\"ps-l\">Source</div></div></div><div class=\"px-label\">Overview</div><div class=\"px-body\">NGSA MRM 2023 entry 64 places Sn.Nb.Ta at Kigom Hills, part of the Jos Plateau ring-complex tin belt.</div><div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Shared processing across the Jos cluster (Rukuba, Shere, Jarawa, Kigom) cuts per-tonne processing costs. Columbite-tantalite supplies EV motor/capacitor markets.</div><div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Jos 30km &middot; Jos airport 40km &middot; Plateau State grid</div><div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Tailings legacy</li><li>Plateau inter-communal flare-ups</li><li>Small-mine scale economics</li></ul></div><div class=\"pcoord\">9.6000&deg; N &middot; 9.1000&deg; E</div>");var m=L.marker([9.6,9.1],{icon:L.divIcon({className:"",html:"<div style=\"position:relative;width:8px;height:8px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#D4AF37;border:1.5px solid rgba(255,255,255,.55);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:3.04px;height:3.04px;background:rgba(255,255,255,.85);transform:translate(-50%,-50%) rotate(45deg);\"></div></div></div>",iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);mineralGroup.addLayer(m);mineralMkrs.push({marker:m,tags:["Tin","Columbite","Tantalite"]});allPopups[285]=p;allAssets.push({name:"KIGOM HILLS Sn-Nb-Ta",type:"Tin",sub:"Plateau",catKey:"minerals",catLabel:"Minerals",color:"#D4AF37",lat:9.6,lng:9.1,marker:m,priority:false,hasBrief:true});})();(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#5E5CE6;\">Power & Utilities &middot; Gas Power</div><div class=\"pt-row expandable\" id=\"ptr-222\"><div class=\"pt-name\">Egbin Power Plant</div><div class=\"pt-arr\" id=\"pxa-222\">&#8595;</div></div><div class=\"pd\">1,320 MW. Lagos grid anchor.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Expansion to 2,000 MW = $600M/yr additional revenue.</div><div class=\"pxsec\" id=\"pxs-222\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">1,320 MW</div><div class=\"ps-l\">Installed Capacity</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">Lagos Grid</div><div class=\"ps-l\">Anchor Station</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">Privatised</div><div class=\"ps-l\">2013 (Sahara)</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">Gas-Fired</div><div class=\"ps-l\">Type</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's largest thermal power station on the Lagos Lagoon. 1,320MW installed capacity privatised to Sahara Energy in 2013. Lagos = Nigeria's commercial capital, 25M+ population with the highest power demand density in West Africa.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Expansion from 1,320MW to 2,000MW at $800M capex adds 680MW to Africa's most valuable load center. At $0.12/kWh wholesale power and 85% load factor, 680MW increment generates $600M/year additional revenue. Highest single-asset power return available in Nigeria.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Lagos Lagoon waterfront site \u00b7 Gas supply from OML 42/53 corridor \u00b7 330kV transmission to Lagos grid</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Gas supply reliability (domestic pipeline vandalism)</li><li>NBET payment arrears to generators</li><li>Regulatory tariff reform needed for full commercial cost recovery</li></ul>\n</div><div class=\"pcoord\">6.5400&deg; N &middot; 3.8010&deg; E</div>");var m=L.marker([6.54,3.801],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:10px;height:10px;\"><div style=\"position:absolute;top:50%;left:50%;width:25.0px;height:25.0px;margin-left:-12.5px;margin-top:-12.5px;border-radius:50%;background:#5E5CE6;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#5E5CE6;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:3.0px;height:3.0px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[10,10],iconAnchor:[5,5],popupAnchor:[0,-13]})}).bindPopup(p);catGroups["utilities"].addLayer(m);allPopups[222]=p;allAssets.push({name:"Egbin Power Plant",type:"Gas Power",sub:"Power & Utilities",catKey:"utilities",catLabel:"Power & Utilities",color:"#5E5CE6",lat:6.54,lng:3.801,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#5E5CE6;\">Power & Utilities &middot; Hydro</div><div class=\"pt-row expandable\" id=\"ptr-223\"><div class=\"pt-name\">Zungeru Hydro</div><div class=\"pt-arr\" id=\"pxa-223\">&#8595;</div></div><div class=\"pd\">700 MW. Commissioned 2024.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Lowest risk hydro in Nigeria. Best risk-adjusted power.</div><div class=\"pxsec\" id=\"pxs-223\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">700 MW</div><div class=\"ps-l\">Installed Capacity</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">2024</div><div class=\"ps-l\">Commissioned</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">China Gezhouba</div><div class=\"ps-l\">EPC Contractor</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">$1.3B</div><div class=\"ps-l\">Project Cost</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's newest and most modern hydro plant. 700MW commissioned 2024 by China Gezhouba Group on the Kaduna River in Niger State. Shiroro Dam upstream provides natural flow regulation.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Lowest risk hydro in Nigeria \u2014 brand new infrastructure (2024), no aging concerns, modern Chinese EPC standards. 20-year PPA with NBET structurable as sovereign-backed take-or-pay. At $0.04/kWh hydro LCOE, Zungeru is the best risk-adjusted power investment in Nigeria.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">330kV transmission to Abuja/Kaduna grid \u00b7 Kaduna River flow regulation (Shiroro upstream) \u00b7 A1 highway adjacent \u00b7 FCT 120km</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>NBET payment reliability (receivables gap sector-wide)</li><li>Kaduna River flow variability (Sahel drought cycles)</li><li>Niger State security environment (Shiroro LGA incidents)</li></ul>\n</div><div class=\"pcoord\">9.8200&deg; N &middot; 6.1470&deg; E</div>");var m=L.marker([9.82,6.147],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:10px;height:10px;\"><div style=\"position:absolute;top:50%;left:50%;width:25.0px;height:25.0px;margin-left:-12.5px;margin-top:-12.5px;border-radius:50%;background:#5E5CE6;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#5E5CE6;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:3.0px;height:3.0px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[10,10],iconAnchor:[5,5],popupAnchor:[0,-13]})}).bindPopup(p);catGroups["utilities"].addLayer(m);allPopups[223]=p;allAssets.push({name:"Zungeru Hydro",type:"Hydro",sub:"Power & Utilities",catKey:"utilities",catLabel:"Power & Utilities",color:"#5E5CE6",lat:9.82,lng:6.147,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#5E5CE6;\">Power & Utilities &middot; IPP</div><div class=\"pt-row expandable\" id=\"ptr-224\"><div class=\"pt-name\">Azura-Edo IPP</div><div class=\"pt-arr\" id=\"pxa-224\">&#8595;</div></div><div class=\"pd\">461 MW. 20yr PPA. IFC-backed.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Secondary market acquisition at 8-10x EBITDA.</div><div class=\"pxsec\" id=\"pxs-224\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">461 MW</div><div class=\"ps-l\">Capacity</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">20 Years</div><div class=\"ps-l\">PPA Duration</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">IFC-Backed</div><div class=\"ps-l\">Structure</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">2018</div><div class=\"ps-l\">Commissioned</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">461MW gas-fired IPP in Edo State. Backed by IFC, World Bank MIGA, and a consortium of DFIs. The first Nigerian IPP with full payment guarantees from the Federal Government of Nigeria.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Secondary market acquisition at 8-10x EBITDA = income-generating infrastructure at sector-average yield. IFC-backed structure with FGN partial risk guarantee = strongest governance in Nigerian power. 20-year PPA is the longest-dated power concession in Nigeria. This is the template deal.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Edo State gas supply pipeline (SEPLAT + Elgin) \u00b7 330kV transmission to South-South grid \u00b7 Benin City 30km \u00b7 Warri 80km</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>20yr PPA with residual NBET credit exposure throughout</li><li>Gas supply contract renewal terms at expiry</li><li>Newer IPPs may have better gas pricing terms in future renegotiations</li></ul>\n</div><div class=\"pcoord\">6.5850&deg; N &middot; 5.6320&deg; E</div>");var m=L.marker([6.585,5.632],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:8px;height:8px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#5E5CE6;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.4px;height:2.4px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["utilities"].addLayer(m);allPopups[224]=p;allAssets.push({name:"Azura-Edo IPP",type:"IPP",sub:"Power & Utilities",catKey:"utilities",catLabel:"Power & Utilities",color:"#5E5CE6",lat:6.585,lng:5.632,marker:m,priority:false,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#5E5CE6;\">Power & Utilities &middot; Submarine Cable</div><div class=\"pt-row expandable\" id=\"ptr-225\"><div class=\"pt-name\">Equiano Cable Landing</div><div class=\"pt-arr\" id=\"pxa-225\">&#8595;</div></div><div class=\"pd\">Google Equiano (144 Tbps). Live 2022.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Digital backbone. Data center co-location play.</div><div class=\"pxsec\" id=\"pxs-225\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">144 Tbps</div><div class=\"ps-l\">Design Capacity</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">2022</div><div class=\"ps-l\">Live</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">Google</div><div class=\"ps-l\">Owner/Operator</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#5E5CE6;\">West Africa</div><div class=\"ps-l\">Backbone</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Google's Equiano submarine cable system. 144 Tbps design capacity connecting Europe to South Africa via West African coastal landing stations. Nigeria landing station at Victoria Island, Lagos.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Digital infrastructure backbone play: data center co-location at the Equiano landing station captures the premium latency advantage. Nigeria is Africa's largest internet market (220M+ population, 70M+ internet users). A Lagos Tier 3 data center co-located at the Equiano landing captures the lowest-latency internet access in West Africa.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Victoria Island Lagos landing \u00b7 Lagos metropolitan fiber network \u00b7 Lekki Tech Corridor proximity</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Google retains owners (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#32ADE6;\">Transportation &middot; Airport</div><div class=\"pt-row expandable\" id=\"ptr-227\"><div class=\"pt-name\">Nnamdi Azikiwe Int'l</div><div class=\"pt-arr\" id=\"pxa-227\">&#8595;</div></div><div class=\"pd\">Federal capital gateway.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Abuja PPP + Murtala bundle.</div><div class=\"pxsec\" id=\"pxs-227\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Federal Capital</div><div class=\"ps-l\">Gateway</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Abuja</div><div class=\"ps-l\">FCT</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Growing Fast</div><div class=\"ps-l\">Demand</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">PPP</div><div class=\"ps-l\">Opportunity</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's second busiest airport serving the Federal Capital Territory. Abuja is Nigeria's fastest-growing city at 8%+/year population growth. Serves the diplomatic, government, and business gateway function.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Abuja PPP bundle with Murtala Muhammed creates a two-airport operator at Nigeria's two most strategic air gateways. At $150M+/year combined Abuja revenues and growing demand, the concession offers inflation-protected infrastructure yield with government sovereign backing.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">FCT Abuja city 40km \u00b7 Federal government ministries captive demand \u00b7 Gurara Dam water system \u00b7 A1 highway connection</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>PPP framework requires FGN commitment on revenue guarantee</li><li>Abuja airport capacity adequate f (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#32ADE6;\">Transportation &middot; Airport</div><div class=\"pt-row expandable\" id=\"ptr-228\"><div class=\"pt-name\">Kano Airport</div><div class=\"pt-arr\" id=\"pxa-228\">&#8595;</div></div><div class=\"pd\">Second busiest cargo.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Air-rail intermodal with Lagos-Kano SGR.</div><div class=\"pxsec\" id=\"pxs-228\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Second Busiest</div><div class=\"ps-l\">Cargo In Nigeria</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Kano</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Air-Rail</div><div class=\"ps-l\">Intermodal</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Lagos-Kano SGR</div><div class=\"ps-l\">Terminus</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's second busiest cargo airport and the primary hub for northern Nigeria. Kano is Nigeria's commercial capital of the north \u2014 leather, textile, and agricultural commodity exports.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Air-rail intermodal hub: Lagos-Kano SGR terminus is adjacent to Kano Airport. Combined air + rail cargo facility = West Africa's most significant northern Nigeria logistics hub. Kano leather and sesame export by air freight to Europe and China creates $200M+/year in high-value cargo.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Kano city 10km \u00b7 Lagos-Kano SGR terminus \u00b7 Tiga + Challawa dams water 40km \u00b7 Kano leather and textile export zone</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Lagos-Kano SGR completion timeline</li><li>Kano State political stability</li><li>Cargo volumes depend on Kano industrial zone activity</li></ul>\n</div><div class=\"pcoord\">12.0480&deg; N &middot; 8.5240&deg; E</div>");var m=L.marker([12.048,8.524],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:8px;height:8px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#32ADE6;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.4px;height:2.4px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["transport"].addLayer(m);allPopups[228]=p;allAssets.push({name:"Kano Airport",type:"Airport",sub:"Transportation",catKey:"transport",catLabel:"Transportation",color:"#32ADE6",lat:12.048,lng:8.524,marker:m,priority:false,hasBrief:true});})();

 congestion \u2014 terminal capacity constraint at Apapa</li><li>Lagos State property compensation claims along route</li></ul>\n</div><div class=\"pcoord\">7.0000&deg; N &middot; 3.6100&deg; E</div>");var m=L.marker([7.0,3.61],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:8px;height:8px;\"><div style=\"position:absolute;top:50%;left:50%;width:20.0px;height:20.0px;margin-left:-10.0px;margin-top:-10.0px;border-radius:50%;background:#32ADE6;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#32ADE6;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.4px;height:2.4px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["transport"].addLayer(m);allPopups[229]=p;allAssets.push({name:"Lagos-Ibadan SGR",type:"Rail",sub:"Transportation",catKey:"transport",catLabel:"Transportation",color:"#32ADE6",lat:7.0,lng:3.61,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#32ADE6;\">Transportation &middot; Rail</div><div class=\"pt-row expandable\" id=\"ptr-230\"><div class=\"pt-name\">Itakpe-Warri SGR</div><div class=\"pt-arr\" id=\"pxa-230\">&#8595;</div></div><div class=\"pd\">277 km. Iron ore to Warri port.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> $80M/yr at 5M MTPA. Mineral export spine.</div><div class=\"pxsec\" id=\"pxs-230\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">277 km</div><div class=\"ps-l\">Route Length</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">$3.96B</div><div class=\"ps-l\">Construction Cost</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Operational</div><div class=\"ps-l\">Since 2020</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Iron Ore</div><div class=\"ps-l\">Primary Cargo</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's most strategically important freight railway. 277km from Itakpe Iron Ore mine to Warri Deep Water Port, passing through Ajaokuta. Operational since 2020 but heavily under-utilised due to Ajaokuta's non-operation.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Mine-to-port rail at 5M MTPA generates $80M/year in toll income. Capacity expandable to 25M MTPA with a second track = $400M/year toll infrastructure. The SGR passes through Ajaokuta, meaning the steel complex can use the same railway for both raw material input and finished product output.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Itakpe Mine terminus \u00b7 Ajaokuta Steel Complex 60km from Itakpe \u00b7 Warri Deep Water Port terminus \u00b7 A2 highway parallel route</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Ajaokuta non-operational (function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#32ADE6;\">Transportation &middot; Road</div><div class=\"pt-row expandable\" id=\"ptr-231\"><div class=\"pt-name\">Lagos-Calabar Highway</div><div class=\"pt-arr\" id=\"pxa-231\">&#8595;</div></div><div class=\"pd\">750 km. $15.6B. Section I Dec 2025.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Highest asset-value multiplier infrastructure in Nigeria.</div><div class=\"pxsec\" id=\"pxs-231\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">750 km</div><div class=\"ps-l\">Total Length</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">$15.6B</div><div class=\"ps-l\">Total Contract</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">6 States</div><div class=\"ps-l\">Traversed</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Bitumen Belt</div><div class=\"ps-l\">Corridor Route</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's most consequential road infrastructure project. 750km coastal highway from Lagos through Ondo (Agbabu bitumen belt), Delta, Bayelsa, Rivers, Akwa Ibom to Calabar. Section I (Lagos-Delta) estimated completion December 2025.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Highest asset-value multiplier infrastructure project in Nigeria. Passes through the $1T+ Agbabu bitumen belt, connects six states' agricultural production to Lagos Port, provides the final land link for Ibom Deep Sea Port, and transforms Calabar FTZ from isolated outpost to eastern industrial corridor terminus.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">6 state corridors \u00b7 Agbabu bitumen belt (direct route) \u00b7 Calabar FTZ connection terminus \u00b7 Ibom Deep Sea Port access \u00b7 Lagos Port western anchor</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>$15.6B contract financing risk (Nigeria FGN budget reliability)</li><li>Multi-section delivery across different terrain and security environments</li><li>Environmental impact in Niger Delta coastal corridor</li></ul>\n</div><div class=\"pcoord\">6.4500&deg; N &middot; 4.5000&deg; E</div>");var m=L.marker([6.45,4.5],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:11px;height:11px;\"><div style=\"position:absolute;top:50%;left:50%;width:27.5px;height:27.5px;margin-left:-13.75px;margin-top:-13.75px;border-radius:50%;background:#32ADE6;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#32ADE6;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:3.3px;height:3.3px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[11,11],iconAnchor:[5,5],popupAnchor:[0,-13]})}).bindPopup(p);catGroups["transport"].addLayer(m);allPopups[231]=p;allAssets.push({name:"Lagos-Calabar Highway",type:"Road",sub:"Transportation",catKey:"transport",catLabel:"Transportation",color:"#32ADE6",lat:6.45,lng:4.5,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#32ADE6;\">Transportation &middot; Port</div><div class=\"pt-row expandable\" id=\"ptr-232\"><div class=\"pt-name\">Ibom Deep Sea Port</div><div class=\"pt-arr\" id=\"pxa-232\">&#8595;</div></div><div class=\"pd\">SE Nigeria maritime gateway.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Completes Lagos-Calabar coastal industrial corridor.</div><div class=\"pxsec\" id=\"pxs-232\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">SE Nigeria</div><div class=\"ps-l\">Gateway</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Akwa Ibom</div><div class=\"ps-l\">State</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Deep Water</div><div class=\"ps-l\">Class</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#32ADE6;\">Highway</div><div class=\"ps-l\">Connection</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">SE Nigeria's primary maritime gateway under development in Akwa Ibom State. Deep-water class port designed to serve the industrial and agricultural output of the SE Nigeria corridor.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Completes the Lagos-Calabar coastal industrial corridor at the eastern end. Ibom Deep Sea Port + Calabar Port (100km west) + Calabar FTZ = SE Nigeria maritime cluster. Lagos-Calabar Highway provides the landside connection.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Lagos-Calabar Highway (direct access) \u00b7 Qua Iboe Terminal 50km \u00b7 Calabar Port 100km \u00b7 Cross River FTZ</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Port construction timeline</li><li>Highway completion prerequisite for full utilisation</li><li>Competition from Calabar Port for SE Nigeria cargo</li></ul>\n</div><
