(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#30D158;\">Agri-Exports &middot; Cocoa</div><div class=\"pt-row expandable\" id=\"ptr-233\"><div class=\"pt-name\">Ondo Cocoa Belt</div><div class=\"pt-arr\" id=\"pxa-233\">&#8595;</div></div><div class=\"pd\">250,000+ MT pa. World #5.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Processing = 4x value. $200M plant = $1.6B annual export.</div><div class=\"pxsec\" id=\"pxs-233\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">250K+ MT</div><div class=\"ps-l\">Annual Output</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">World #5</div><div class=\"ps-l\">Cocoa Producer</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">$2,500/T</div><div class=\"ps-l\">Raw Bean Price</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">4x</div><div class=\"ps-l\">Processing Uplift</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's Ondo-Osun cocoa belt produces 250,000+ MT per year, making Nigeria the world's fifth-largest cocoa producer. Current export is predominantly raw beans at $2,500/tonne \u2014 processing to butter and powder captures $6,000-8,000/tonne.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Cocoa processing = 4x value uplift. A $200M processing complex in Akure captures $1.6B in annual export value vs. $625M currently. Mars, Nestle, and Barry Callebaut are all structuring long-term West African supply agreements. Okinni Dam (329M m3) provides industrial water 40km away.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Lagos-Calabar Highway (through the belt) \u00b7 Okinni Dam water 40km \u00b7 Warri Port 200km \u00b7 Ibadan processing zone 100km</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Cocoa price volatility (global commodity cycle)</li><li>Aging farm stock \u2014 average cocoa tree 30+ years old</li><li>Climate risk \u2014 cocoa is heat-sensitive</li></ul>\n</div><div class=\"pcoord\">6.8900&deg; N &middot; 4.9300&deg; E</div>");var m=L.marker([6.89,4.93],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:10px;height:10px;\"><div style=\"position:absolute;top:50%;left:50%;width:25.0px;height:25.0px;margin-left:-12.5px;margin-top:-12.5px;border-radius:50%;background:#30D158;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#30D158;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:3.0px;height:3.0px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[10,10],iconAnchor:[5,5],popupAnchor:[0,-13]})}).bindPopup(p);catGroups["agri"].addLayer(m);allPopups[233]=p;allAssets.push({name:"Ondo Cocoa Belt",type:"Cocoa",sub:"Agri-Exports",catKey:"agri",catLabel:"Agri-Exports",color:"#30D158",lat:6.89,lng:4.93,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#30D158;\">Agri-Exports &middot; Ginger</div><div class=\"pt-row expandable\" id=\"ptr-234\"><div class=\"pt-name\">Jos Ginger Hub</div><div class=\"pt-arr\" id=\"pxa-234\">&#8595;</div></div><div class=\"pd\">World #1 ginger. 800K+ MT pa.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Oil processing = 5x value. $50M plant = $400M annual export.</div><div class=\"pxsec\" id=\"pxs-234\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">800K+ MT</div><div class=\"ps-l\">Annual Output</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">World #1</div><div class=\"ps-l\">Ginger Producer</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">$0.24/kg</div><div class=\"ps-l\">Raw Export Price</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">5x</div><div class=\"ps-l\">Oil Processing Value</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's Jos Plateau produces more ginger than any other single region on Earth. Current exports are raw root at $0.24/kg. Yakubu Gowon Dam provides industrial water 30km away.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Ginger oil and oleoresin processing converts $0.24/kg raw root to $1.20+/kg refined extract \u2014 5x value uplift. A $50M processing facility at 200,000 MT/year throughput unlocks $400M+ in annual export value vs. $80M current raw export. India and China are the only competitors.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Jos-Abuja highway 300km \u00b7 Nnamdi Azikiwe Airport (air freight for extracts) \u00b7 Yakubu Gowon Dam water 30km \u00b7 Itakpe-Warri SGR 200km south</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Climate sensitivity on the Plateau (2022-2023 drought impacted yield 30%)</li><li>Price competition from India/China in oleoresin processing</li><li>Cold chain requirement for oil/oleoresin</li></ul>\n</div><div class=\"pcoord\">9.9200&deg; N &middot; 8.9000&deg; E</div>");var m=L.marker([9.92,8.9],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:11px;height:11px;\"><div style=\"position:absolute;top:50%;left:50%;width:27.5px;height:27.5px;margin-left:-13.75px;margin-top:-13.75px;border-radius:50%;background:#30D158;animation:mPulse 3s ease-out infinite;pointer-events:none;\"></div><div style=\"position:absolute;inset:0;border-radius:50%;background:#30D158;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:3.3px;height:3.3px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[11,11],iconAnchor:[5,5],popupAnchor:[0,-13]})}).bindPopup(p);catGroups["agri"].addLayer(m);allPopups[234]=p;allAssets.push({name:"Jos Ginger Hub",type:"Ginger",sub:"Agri-Exports",catKey:"agri",catLabel:"Agri-Exports",color:"#30D158",lat:9.92,lng:8.9,marker:m,priority:true,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#30D158;\">Agri-Exports &middot; Palm Oil</div><div class=\"pt-row expandable\" id=\"ptr-235\"><div class=\"pt-name\">Niger Delta Palm Oil</div><div class=\"pt-arr\" id=\"pxa-235\">&#8595;</div></div><div class=\"pd\">1M+ MT CPO pa.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Refinery = 3x value. Unilever/Wilmar off-take.</div><div class=\"pxsec\" id=\"pxs-235\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">1M+ MT</div><div class=\"ps-l\">CPO Annual Output</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">World #5</div><div class=\"ps-l\">Palm Producer (hist.)</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">3x</div><div class=\"ps-l\">Refinery Value Uplift</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">Cross River</div><div class=\"ps-l\">Primary Belt</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria produces 1M+ MT of crude palm oil per year from the Niger Delta and South-South corridor. Nigeria was the world's largest palm oil producer in the 1970s before collapse of the RBDA irrigation schemes.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">CPO at $900/tonne to refined palm olein at $1,100/tonne to specialty fractions at $1,800/tonne = 3x value uplift at specialty end. A $120M refinery in the Niger Delta captures $900M in annual refined revenue. Unilever and Wilmar are structuring off-take agreements for West African refined palm.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Niger Delta waterway network \u00b7 Calabar Port \u00b7 Onne Port O&G Free Zone \u00b7 Cross River processing zone</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Environmental concerns (RSPO certification required for EU market)</li><li>Land tenure in Niger Delta palm belt</li><li>Competition from Malaysia and Indonesia on price</li></ul>\n</div><div class=\"pcoord\">5.0000&deg; N &middot; 7.5000&deg; E</div>");var m=L.marker([5.0,7.5],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:9px;height:9px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#30D158;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.6999999999999997px;height:2.6999999999999997px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[9,9],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["agri"].addLayer(m);allPopups[235]=p;allAssets.push({name:"Niger Delta Palm Oil",type:"Palm Oil",sub:"Agri-Exports",catKey:"agri",catLabel:"Agri-Exports",color:"#30D158",lat:5.0,lng:7.5,marker:m,priority:false,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#30D158;\">Agri-Exports &middot; Sesame</div><div class=\"pt-row expandable\" id=\"ptr-236\"><div class=\"pt-name\">Jigawa Sesame Belt</div><div class=\"pt-arr\" id=\"pxa-236\">&#8595;</div></div><div class=\"pd\">450,000+ MT. World #2.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Oil processing = 3x value. Japan premium market.</div><div class=\"pxsec\" id=\"pxs-236\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">450K+ MT</div><div class=\"ps-l\">Annual Output</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">World #2</div><div class=\"ps-l\">Sesame Producer</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">Japan Premium</div><div class=\"ps-l\">Market</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">$800/T</div><div class=\"ps-l\">White Sesame Price</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's Jigawa State is the heart of the world's second-largest sesame-producing country. 450,000+ MT per year at $800/tonne for premium white sesame. Japan pays 20% premium for Nigerian white sesame over Indian equivalents.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Sesame oil processing = 3x value: $800/tonne seeds to $2,400/tonne sesame oil + $400/tonne tahini. A $40M processing facility capturing 200,000 MT/year generates $480M in processed revenue. Japan, Korea, and China are structured buyers.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Kano market 200km \u00b7 Kano Airport (air freight for premium grades) \u00b7 Hadejia Barrage Dam irrigation \u00b7 Northern Nigeria road network</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Sesame is rain-fed \u2014 climate variability (Sahel) causes significant yield swings</li><li>Price competition from Ethiopia, India, Sudan</li><li>Processing export requires SPS (food safety) certification for Japanese market</li></ul>\n</div><div class=\"pcoord\">12.2200&deg; N &middot; 9.7300&deg; E</div>");var m=L.marker([12.22,9.73],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:8px;height:8px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#30D158;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.4px;height:2.4px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["agri"].addLayer(m);allPopups[236]=p;allAssets.push({name:"Jigawa Sesame Belt",type:"Sesame",sub:"Agri-Exports",catKey:"agri",catLabel:"Agri-Exports",color:"#30D158",lat:12.22,lng:9.73,marker:m,priority:false,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#30D158;\">Agri-Exports &middot; Shea</div><div class=\"pt-row expandable\" id=\"ptr-237\"><div class=\"pt-name\">Shea Butter Belt</div><div class=\"pt-arr\" id=\"pxa-237\">&#8595;</div></div><div class=\"pd\">500,000+ MT pa.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> L'Oreal+Unilever buyers. 3x nut-to-butter uplift.</div><div class=\"pxsec\" id=\"pxs-237\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">500K+ MT</div><div class=\"ps-l\">Annual Shea Nuts</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">L'Oreal + Unilever</div><div class=\"ps-l\">Active Buyers</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">3x</div><div class=\"ps-l\">Nut-to-Butter Uplift</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#30D158;\">Carbon Credit</div><div class=\"ps-l\">Park Potential</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">Nigeria's shea belt across the Middle Belt states produces 500,000+ MT of shea nuts annually. Shea butter is used by L'Oreal, Unilever, and major chocolate manufacturers. Shea is also a critical crop in sustainable land use and carbon credit schemes.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Shea butter processing: $300/tonne nuts to $900/tonne refined shea butter = 3x uplift. At 200,000 MT/year refined butter, revenue is $180M vs. $60M current. Carbon credit opportunity: shea parkland preservation generates $10-30/tonne CO2 credits in voluntary markets.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Middle Belt road network \u00b7 Kano and Abuja markets \u00b7 Northern Nigeria cold chain (developing) \u00b7 A2 highway corridor</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Shea is wild-harvested \u2014 supply is weather-dependent and not controllable</li><li>L'Oreal supply agreements require consistent quality grading</li><li>Processing and cold chain infrastructure virtually absent domestically</li></ul>\n</div><div class=\"pcoord\">10.0000&deg; N &middot; 5.5000&deg; E</div>");var m=L.marker([10.0,5.5],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:8px;height:8px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#30D158;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.4px;height:2.4px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["agri"].addLayer(m);allPopups[237]=p;allAssets.push({name:"Shea Butter Belt",type:"Shea",sub:"Agri-Exports",catKey:"agri",catLabel:"Agri-Exports",color:"#30D158",lat:10.0,lng:5.5,marker:m,priority:false,hasBrief:true});})();

(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#22CC88;\">Industrial Zones &middot; FTZ</div><div class=\"pt-row expandable\" id=\"ptr-238\"><div class=\"pt-name\">Lekki Free Trade Zone</div><div class=\"pt-arr\" id=\"pxa-238\">&#8595;</div></div><div class=\"pd\">3,200+ ha. Largest FTZ West Africa.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Port+SEZ = Shenzhen model.</div><div class=\"pxsec\" id=\"pxs-238\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">3,200+ Ha</div><div class=\"ps-l\">Zone Area</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">Largest FTZ</div><div class=\"ps-l\">West Africa</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">Lekki-Epe</div><div class=\"ps-l\">Corridor</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">Port Adjacent</div><div class=\"ps-l\">Location</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">3,200+ hectare free trade zone anchoring the Lekki-Epe corridor, adjacent to Lekki Deep Sea Port and Dangote Refinery. Nigeria's Shenzhen equivalent \u2014 port-backed industrial development zone.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Port + SEZ creates the logistics to manufacturing to export flywheel. FTZ incentives (5yr tax holiday, 0% import duty) make Lekki the most competitive manufacturing location in West Africa. At $80/sqm industrial land and 3,200ha zone area = $2.56B in land value activation potential.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Lekki Deep Sea Port adjacent \u00b7 Dangote Refinery adjacent \u00b7 Lagos-Epe Expressway \u00b7 Future SGR extension \u00b7 435MW Dangote captive power grid</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Infrastructure delivery timeline vs. tenant expectations</li><li>Lagos State/FGN jurisdiction overlap on FTZ administration</li><li>Naira devaluation creates FX risk for manufacturing exporters</li></ul>\n</div><div class=\"pcoord\">6.4450&deg; N &middot; 3.7580&deg; E</div>");var m=L.marker([6.445,3.758],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:9px;height:9px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#22CC88;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.6999999999999997px;height:2.6999999999999997px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[9,9],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["industrial"].addLayer(m);allPopups[238]=p;allAssets.push({name:"Lekki Free Trade Zone",type:"FTZ",sub:"Industrial Zones",catKey:"industrial",catLabel:"Industrial Zones",color:"#22CC88",lat:6.445,lng:3.758,marker:m,priority:false,hasBrief:true});})();
(function(){var p=L.popup({maxWidth:400,minWidth:320}).setContent("<div class=\"pc\" style=\"color:#22CC88;\">Industrial Zones &middot; FTZ</div><div class=\"pt-row expandable\" id=\"ptr-239\"><div class=\"pt-name\">Calabar Free Trade Zone</div><div class=\"pt-arr\" id=\"pxa-239\">&#8595;</div></div><div class=\"pd\">4,000+ ha. SE maritime gateway.</div><div class=\"pi\"><strong style=\"color:rgba(100,220,160,.82);\">SWF Note:</strong> Lagos-Calabar Highway unlocks this entirely.</div><div class=\"pxsec\" id=\"pxs-239\">\n<div class=\"psgrid\"><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">4,000+ Ha</div><div class=\"ps-l\">Zone Area</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">SE Gateway</div><div class=\"ps-l\">Position</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">Calabar Port</div><div class=\"ps-l\">Adjacent</div></div><div class=\"ps\"><div class=\"ps-v\" style=\"color:#22CC88;\">2001</div><div class=\"ps-l\">Established</div></div></div>\n<div class=\"px-label\">Overview</div><div class=\"px-body\">4,000+ hectare free trade zone in Cross River State adjacent to Calabar Port. One of Nigeria's original FTZs, established 2001. Historically under-utilised due to poor road access \u2014 Lagos-Calabar Highway changes this completely.</div>\n<div class=\"px-label\">Investment Thesis</div><div class=\"px-thesis\">Lagos-Calabar Highway makes Calabar FTZ the eastern terminus of Nigeria's coastal industrial corridor. 4,000ha at current utilisation is 15% \u2014 85% upside is a pure infrastructure development play. When Section IV opens, Calabar becomes the eastern anchor of a Lagos-Calabar manufacturing belt.</div>\n<div class=\"px-label\">Infrastructure</div><div class=\"px-body\">Calabar Port adjacent \u00b7 Lagos-Calabar Highway terminus (under construction) \u00b7 Ibom Deep Sea Port 80km \u00b7 Cross River state airport</div>\n<div class=\"px-label\">Key Risks</div><ul class=\"px-risks\"><li>Highway completion timeline (Section IV furthest from construction start)</li><li>Historical underutilisation creates institutional inertia</li><li>Calabar Port depth requires dredging for full VLCC capability</li></ul>\n</div><div class=\"pcoord\">4.9730&deg; N &middot; 8.3520&deg; E</div>");var m=L.marker([4.973,8.352],{icon:L.divIcon({className:'',html:"<div style=\"position:relative;width:8px;height:8px;\"><div style=\"position:absolute;inset:0;border-radius:50%;background:#22CC88;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.5);\"><div style=\"position:absolute;top:50%;left:50%;width:2.4px;height:2.4px;background:rgba(255,255,255,.8);border-radius:50%;transform:translate(-50%,-50%);\"></div></div></div>",iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-12]})}).bindPopup(p);catGroups["industrial"].addLayer(m);allPopups[239]=p;allAssets.push({name:"Calabar Free Trade Zone",type:"FTZ",sub:"Industrial Zones",catKey:"industrial",catLabel:"Industrial Zones",color:"#22CC88",lat:4.973,lng:8.352,marker:m,priority:false,hasBrief:true});})();

map.on('popupopen', function(e) {
  var popup = e.popup;
  var idx = allPopups.indexOf(popup);
  if (idx < 0) return;
  var el = popup.getElement();
  if (!el) return;
  var row = el.querySelector('#ptr-' + idx);
  if (!row) return;
  row.addEventListener('click', function(ev) {
    ev.stopPropagation();
    var pxs = el.querySelector('#pxs-' + idx);
    var arr = el.querySelector('#pxa-' + idx);
    if (!pxs) return;
    var open = pxs.style.display !== 'block';
    pxs.style.display = open ? 'block' : 'none';
    if (arr) { arr.innerHTML = open ? '&#8593;' : '&#8595;'; arr.classList.toggle('open', open); }
  });
});

function setOGFilter(f){
  currentOGFilter=f;
  ['all','ports','priority','maintain','farmdown','divest','gas'].forEach(function(k){
    var el=document.getElementById('ogf-'+k);
    if(el) el.classList.toggle('og-on',k===f);
  });
  energyMarkers.forEach(function(em){
    var show=true;
    if(f==='ports') show=em.subtype==='port';
    else if(f==='priority') show=em.subtype==='priority';
    else if(f==='maintain') show=em.subtype==='maintain';
    else if(f==='farmdown') show=em.subtype==='farmdown';
    else if(f==='divest') show=em.subtype==='divest';
    else if(f==='gas') show=em.gas;
    if(show&&!energyGroup.hasLayer(em.marker))energyGroup.addLayer(em.marker);
    else if(!show&&energyGroup.hasLayer(em.marker))energyGroup.removeLayer(em.marker);
  });
}

var abFilter='all';
function buildABTabs(){
  var el=document.getElementById('ab-tabs');
  AB_CATS.forEach(function(c){
    var t=document.createElement('div');
    t.className='ab-tab'+(abFilter===c.key?' on':'');
    t.id='abt-'+c.key;
    t.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+c.color+';margin-right:5px;vertical-align:middle;"></span>'+c.label;
    t.onclick=function(){abFilter=c.key;document.querySelectorAll('.ab-tab').forEach(function(x){x.classList.remove('on');});t.classList.add('on');renderABList();};
    el.appendChild(t);
  });
}
function renderABList(){
  var search=(document.getElementById('ab-search')||{value:''}).value.toLowerCase();
  var list=document.getElementById('ab-list');
  var filtered=allAssets.filter(function(a){
    return (abFilter==='all'||a.catKey===abFilter)&&(!search||a.name.toLowerCase().includes(search)||a.type.toLowerCase().includes(search)||(a.sub||'').toLowerCase().includes(search));
  });
  if(!filtered.length){list.innerHTML='<div class="ab-empty">No assets match</div>';return;}
  var groups={};
  filtered.forEach(function(a){if(!groups[a.catKey])groups[a.catKey]=[];groups[a.catKey].push(a);});
  var html='';
  ['portfolio','minerals','water','energy','utilities','transport','agri','industrial','emergency','proposed'].forEach(function(ck){
    if(!groups[ck])return;
    var rep=allAssets.find(function(a){return a.catKey===ck;});
    var color=rep?rep.color:'#fff';
    var label=rep?rep.catLabel:ck;
    if(abFilter==='all') html+='<div class="ab-cat"><div style="width:7px;height:7px;border-radius:50%;background:'+color+';flex-shrink:0;"></div>'+label.toUpperCase()+' <span style="opacity:.4;">('+groups[ck].length+')</span><div class="ab-cat-line"></div></div>';
    groups[ck].forEach(function(a){
      var star=a.priority?'<span style="color:'+a.color+';font-size:9px;margin-left:3px;opacity:.7;">&#9733;</span>':'';
      var gas=a.gas?'<span style="font-size:9px;color:rgba(255,149,0,.7);margin-left:3px;">&#9981;</span>':'';
      var brief=a.hasBrief?'<span style="font-size:9px;color:rgba(10,132,255,.5);margin-left:3px;">&#9679;</span>':'';
      var tier=a.tier?'<span style="font-size:9px;color:'+a.color+';margin-left:3px;opacity:.55;">'+({priority:'Pri',maintain:'Mnt',farmdown:'FD',divest:'Div'}[a.tier]||'')+'</span>':'';
      var ai=allAssets.indexOf(a);
      html+='<div class="ab-row" onclick="flyToAsset('+a.lat+','+a.lng+','+ai+')"><div class="ab-dot" style="background:'+a.color+';"></div><div class="ab-info"><div class="ab-name">'+a.name+star+gas+brief+tier+'</div><div class="ab-sub">'+a.type+' &middot; '+(a.sub||'')+'</div></div><div class="ab-type" style="border-color:'+a.color+'22;color:'+a.color+';opacity:.7;">'+a.type.split(' ')[0]+'</div><div class="ab-arrow">&#8594;</div></div>';
    });
  });
  list.innerHTML=html;
}
function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var btn=document.getElementById('sidebar-toggle');
  if(sb.classList.contains('open')){
    sb.classList.remove('open');
    sb.classList.add('closing');
    btn.classList.remove('active');
    setTimeout(function(){sb.classList.remove('closing');},200);
  } else {
    sb.classList.remove('closing');
    sb.classList.add('open');
    btn.classList.add('active');
  }
}
function headerSearchHandler(val){
  if(val.length>0){
    abFilter='all';
    document.querySelectorAll('.ab-tab').forEach(function(t){t.classList.remove('on');});
    var at=document.getElementById('abt-all');if(at)at.classList.add('on');
    var ab=document.getElementById('ab');
    ab.classList.add('open');
    var s=document.getElementById('ab-search');
    if(s) s.value=val;
    renderABList();
  } else {
    closeBrowser();
  }
}
function openBrowser(filter){
  var ab=document.getElementById('ab');
  if(ab.classList.contains('open')&&abFilter===filter){closeBrowser();return;}
  abFilter=filter;
  document.querySelectorAll('.ab-tab').forEach(function(t){t.classList.remove('on');});
  var st=document.getElementById('abt-'+filter);
  if(st) st.classList.add('on');
  ab.classList.add('open');
  var s=document.getElementById('ab-search');
  if(s) s.value='';
  document.getElementById('header-search').value='';
  renderABList();
}
function closeBrowser(){
  document.getElementById('ab').classList.remove('open');
  document.getElementById('header-search').value='';
}
window.flyToAsset=function(lat,lng,idx){
  closeBrowser();
  var asset=allAssets[idx];
  if(!asset) return;
  map.flyTo([lat,lng],11,{duration:1.1,easeLinearity:0.4});
  setTimeout(function(){if(asset.marker)asset.marker.openPopup();},1200);
};

var lyrOpen = {};

function renderLayers(){
  var host = document.getElementById('lyrs');
  if(!host) return;
  host.innerHTML = '';
  LAYER_DEFS.forEach(function(L){
    var g = L.group();
    var on = g && g._map;
    var hasFilters = L.filters && L.filters.length;
    var row = document.createElement('div');
    row.className = 'lyr-row ' + (on?'on':'off');
    row.id = 'lyr-' + L.key;
    row.innerHTML =
      '<div class="lyr-dot" style="background:'+L.color+';"></div>' +
      '<div class="lyr-name">'+L.label+'</div>' +
      '<div class="lyr-count">'+L.count()+'</div>' +
      (hasFilters ? '<div class="lyr-caret'+(lyrOpen[L.key]?' open':'')+'">\u25b6</div>' : '<div style="width:16px;"></div>');
    row.onclick = function(ev){
      if(ev.target && ev.target.classList && ev.target.classList.contains('lyr-caret')){
        if(!hasFilters) return;
        lyrOpen[L.key] = !lyrOpen[L.key];
        renderLayers();
        return;
      }
      toggleLayer(L.key);
    };
    host.appendChild(row);
    if(hasFilters){
      var body = document.createElement('div');
      body.className = 'lyr-filters' + (lyrOpen[L.key] && on ? ' open' : '');
      L.filters.forEach(function(f){
        var chip = document.createElement('span');
        var isCur = L.currentFilter && L.currentFilter()===f.k;
        chip.className = 'lyr-fchip' + (isCur ? ' ' + (L.chipClass||'on') : '');
        chip.innerHTML = f.label + ' <span class="fc">'+f.n()+'</span>';
        chip.onclick = function(e){ e.stopPropagation(); if(L.setFilter) L.setFilter(f.k); renderLayers(); };
        body.appendChild(chip);
      });
      host.appendChild(body);
    }
  });
}

function toggleLayer(key){
  var L = LAYER_DEFS.find(function(x){return x.key===key;});
  if(!L) return;
  var g = L.group();
  if(!g) return;
  if(g._map){ map.removeLayer(g); }
  else { g.addTo(map); }
  // Mirror state onto legacy .cpill elements so headerSearch/closeBrowser logic stays consistent
  if(key==='portfolio' && typeof pfPill!=='undefined'){ pfPill.classList.toggle('off', !g._map); }
  if(key==='minerals' && typeof mPill!=='undefined'){ mPill.classList.toggle('off', !g._map); }
  if(key==='energy' && typeof energyPill!=='undefined'){ energyPill.classList.toggle('off', !g._map); }
  if(key==='water' && typeof wPill!=='undefined'){ wPill.classList.toggle('off', !g._map); }
  renderLayers();
}

function toggleExplore(){
  var ab = document.getElementById('ab');
  var btn = document.getElementById('explore-toggle');
  var hs = document.getElementById('header-search');
  if(ab.classList.contains('open') && ab.classList.contains('explore-mode')){
    ab.classList.remove('open');
    ab.classList.remove('explore-mode');
    if(btn) btn.classList.remove('active');
    return;
  }
  var sb = document.getElementById('sidebar');
  if(sb && sb.classList.contains('open')){ toggleSidebar(); }
  abFilter = 'all';
  document.querySelectorAll('.ab-tab').forEach(function(t){t.classList.remove('on');});
  var at = document.getElementById('abt-all'); if(at) at.classList.add('on');
  var s = document.getElementById('ab-search'); if(s) s.value='';
  if(hs) hs.value='';
  ab.classList.add('open');
  ab.classList.add('explore-mode');
  if(btn) btn.classList.add('active');
  renderABList();
}

// When closeBrowser runs, also clear explore button state and explore-mode class
(function(){
  var _cb = closeBrowser;
  closeBrowser = function(){
    _cb();

    if(ab) ab.classList.remove('explore-mode');
